<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; }
        #postcode { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div id="postcode"></div>
<script>
    function loadPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
                Android.onAddressSelected(data.roadAddress, data.zonecode);
            },
            width: '100%',
            height: '100%'
        }).embed(document.getElementById('postcode'));
    }
</script>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"
        onload="loadPostcode()"></script>
</body>
</html>
