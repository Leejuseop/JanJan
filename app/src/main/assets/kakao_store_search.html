<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; }
        #search-box {
            display: flex;
            padding: 12px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        #search-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #4ECBAC;
            border-radius: 8px 0 0 8px;
            font-size: 16px;
            outline: none;
        }
        #search-btn {
            padding: 10px 16px;
            background: #4ECBAC;
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            font-size: 16px;
            cursor: pointer;
        }
        #results { overflow-y: auto; }
        .result-item {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .result-item:active { background: #f5f5f5; }
        .place-name { font-size: 16px; font-weight: bold; color: #333; }
        .place-address { font-size: 13px; color: #888; margin-top: 4px; }
        .place-phone { font-size: 13px; color: #4ECBAC; margin-top: 2px; }
        #empty { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>
<div id="search-box">
    <input id="search-input" type="text" placeholder="가게 이름을 검색하세요">
    <button id="search-btn" onclick="search()">검색</button>
</div>
<div id="results"><div id="empty">가게 이름을 검색해주세요</div></div>

<script>
    window.__places = [];

    document.getElementById('search-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') search();
    });

    function search() {
        var query = document.getElementById('search-input').value.trim();
        if (!query) return;

        fetch('https://dapi.kakao.com/v2/local/search/keyword.json?query=' + encodeURIComponent(query) + '&size=10', {
            headers: { 'Authorization': 'KakaoAK c7cd3eb704854a2b1f19fff6c43fc2e4' }
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            Android.log('응답: ' + JSON.stringify(data));
            var results = document.getElementById('results');
            if (!data.documents || data.documents.length === 0) {
                results.innerHTML = '<div id="empty">검색 결과가 없습니다</div>';
                return;
            }
            window.__places = data.documents;
            results.innerHTML = data.documents.map(function(place, index) {
                return '<div class="result-item" onclick="selectPlace(' + index + ')">' +
                    '<div class="place-name">' + place.place_name + '</div>' +
                    '<div class="place-address">' + (place.road_address_name || place.address_name) + '</div>' +
                    '<div class="place-phone">' + (place.phone || '전화번호 없음') + '</div>' +
                    '</div>';
            }).join('');
        })
        .catch(function(e) {
            Android.log('오류: ' + e.message);
        });
    }

    function selectPlace(index) {
        var place = window.__places[index];
        if (!place) return;
        Android.onStoreSelected(
            place.place_name || '',
            place.phone || '',
            place.road_address_name || place.address_name || '',
            place.id || '',
            place.category_name || '',
            place.place_url || '',
            place.road_address_name || '',
            place.address_name || ''
        );
    }
</script>
</body>
</html>
